<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Media Catcher Test Page</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f7fa;
        color: #17202a;
        font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(840px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        letter-spacing: 0;
      }

      .panel {
        display: grid;
        gap: 16px;
        padding: 18px;
        border: 1px solid #d8dee7;
        border-radius: 8px;
        background: #ffffff;
      }

      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #111820;
      }

      a {
        color: #0b6f6a;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Media Catcher 测试页</h1>
      <div class="panel">
        <video controls preload="metadata" src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"></video>
        <a href="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" download>直接 MP4 下载链接</a>
        <a href="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">公开 HLS 测试流</a>
      </div>
    </main>
  </body>
</html>
