<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Media Catcher</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Media Catcher</h1>
        <p id="pageTitle">正在读取当前页面...</p>
      </div>
      <span id="countBadge" class="badge">0</span>
    </header>

    <main>
      <div class="toolbar">
        <button id="scanBtn" type="button">重新扫描</button>
        <button id="clearBtn" type="button" class="secondary">清空</button>
      </div>

      <p id="status" class="status">打开含视频的页面后播放几秒，捕获结果会显示在这里。</p>
      <div id="items" class="items"></div>
    </main>

    <template id="itemTemplate">
      <article class="item">
        <div class="item-thumb" aria-hidden="true">
          <img alt="">
          <span>VIDEO</span>
        </div>
        <div class="item-main">
          <div class="item-title"></div>
          <div class="item-meta"></div>
        </div>
        <div class="item-actions">
          <button type="button" data-action="primary">下载</button>
          <button type="button" data-action="copy" class="secondary">复制</button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
